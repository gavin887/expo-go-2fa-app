name: Build Android APK with ABI Split

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # 允许手动触发

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]
      fail-fast: false  # 一个失败不停止其他构建
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 缓存 Node.js 依赖
      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/cache
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'  # GitHub 原生缓存

      - name: Install dependencies with Yarn
        run: |
          if [ -f "yarn.lock" ]; then
            echo "📦 使用 yarn.lock 安装依赖（锁定版本）"
            yarn install --frozen-lockfile --cache-folder .yarn/cache
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # 2. 缓存 Gradle 依赖
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
            ${{ runner.os }}-

      # 3. 缓存 Expo 构建缓存
      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: |
            android/.expo
            node_modules/.cache/expo
          key: ${{ runner.os }}-expo-${{ hashFiles('app.json', 'app.config.js', 'metro.config.js') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      # 4. 缓存 Android SDK 和构建工具
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/android-sdk
            /usr/local/lib/android/sdk
          key: ${{ runner.os }}-android-sdk-${{ env.JAVA_VERSION }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Install dependencies with Yarn
        run: |
          if [ -f "yarn.lock" ]; then
            echo "📦 使用 yarn.lock 安装依赖（锁定版本）"
            yarn install --frozen-lockfile --cache-folder .yarn/cache
          fi

      # 5. 优化：只在需要时重新生成 android 文件夹
      - name: Check if prebuild needed
        id: check_prebuild
        run: |
          # 检查 android 文件夹是否存在且配置未变化
          if [ -d "android" ] && [ -f "android/.prebuild_hash" ]; then
            CURRENT_HASH=$(find . -name "app.json" -o -name "app.config.js" -o -name "metro.config.js" -o -name "package.json" | xargs md5sum | md5sum | cut -d' ' -f1)
            CACHED_HASH=$(cat android/.prebuild_hash 2>/dev/null || echo "")
            if [ "$CURRENT_HASH" = "$CACHED_HASH" ]; then
              echo "prebuild_needed=false" >> $GITHUB_OUTPUT
              echo "✅ 使用缓存的 android 文件夹"
            else
              echo "prebuild_needed=true" >> $GITHUB_OUTPUT
              echo "🔄 prebuild 配置已变化，需要重新生成"
            fi
          else
            echo "prebuild_needed=true" >> $GITHUB_OUTPUT
            echo "🆕 首次构建，需要生成 android 文件夹"
          fi

      - name: Generate Android native folder
        if: steps.check_prebuild.outputs.prebuild_needed == 'true'
        run: |
          npx expo prebuild --clean --platform android
          # 保存配置哈希
          find . -name "app.json" -o -name "app.config.js" -o -name "metro.config.js" -o -name "package.json" | xargs md5sum | md5sum | cut -d' ' -f1 > android/.prebuild_hash
          echo "✅ Android 文件夹已生成"

      - name: Configure ABI splits in app/build.gradle
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          # 检查是否已经配置过 ABI splits
          if ! grep -q "abiFilters" "$BUILD_GRADLE"; then
            sed -i '/android {/a\
        splits {\
            abi {\
                enable true\
                reset()\
                include '\''arm64-v8a'\'', '\''x86_64'\''\
                universalApk true\
            }\
        }' "$BUILD_GRADLE"
            
            # 配置输出的 APK 文件名
            sed -i '/android {/a\
        applicationVariants.all { variant ->\
            variant.outputs.each { output ->\
                def abi = output.getFilter(com.android.build.OutputFile.ABI)\
                if (abi != null) {\
                    output.outputFileName = "${project.name}-${abi}.apk"\
                }\
            }\
        }' "$BUILD_GRADLE"
          fi
          
          echo "✅ 已配置 ABI splits"

      # 6. 构建 ABI-specific APK（需 build.gradle 中配置 splits）
      - name: Build ABI-specific APK
        run: |
          cd android
          chmod +x gradlew
          echo "📦 构建 ABI: ${{ matrix.abi }}"
          
          # 执行 assembleRelease（ABI splits 由 build.gradle 控制）
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs=-Xmx3072m \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true \
            -Dorg.gradle.daemon=true \
            --build-cache \
            --parallel \
            --no-daemon
          
          cd ..
          
          # 精确匹配 splits 输出路径
          APK_PATH="android/app/build/outputs/apk/release/${{project.name}}-${{ matrix.abi }}.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ 构建成功: ${{ matrix.abi }} APK ($APK_PATH)"
            echo "BUILD_ARTIFACT_PATH=$APK_PATH" >> $GITHUB_ENV
            echo "BUILD_ARTIFACT_TYPE=apk" >> $GITHUB_ENV
          else
            echo "❌ 构建完成但未找到 ABI-specific APK: $APK_PATH"
            ls -la android/app/build/outputs/apk/release/
            exit 1
          fi

      - name: Upload ABI-specific APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.abi }}-${{ github.ref_name }}
          path: android/app/build/outputs/apk/release/${{project.name}}-${{ matrix.abi }}.apk
          if-no-files-found: error
          compression-level: 0  # 不压缩，加快上传速度
          retention-days: 7

  # 保存 Gradle 缓存以便后续作业使用
  save-gradle-cache:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          echo "📦 下载的产物："
          ls -la artifacts/
          find artifacts -name "*.apk" -type f

      - name: Create Release with all APKs
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/**/*.apk"
          token: ${{ github.token }}
          generateReleaseNotes: true
          allowUpdates: true

  # 清理旧缓存
  cleanup:
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Cleanup old caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const cache of caches.data.actions_caches) {
              if (cache.last_accessed_at < new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString()) {
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                });
                console.log(`Deleted cache: ${cache.key}`);
              }
            }